{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center text-center mt-5">
    <div class="col-md-6">
        <h2 class="mb-4 text-danger fw-bold">🏯 誠心祈求指引</h2>
        <p class="text-muted mb-4">
            請在心中默念您的姓名、出生年月日及想請示的問題，
            心誠則靈，準備好後點擊下方按鈕開始抽籤。
        </p>
        
        <form action="{{ url_for('fortune.draw') }}" method="POST">
            <button type="submit" class="btn btn-warning btn-lg rounded-pill shadow px-5 py-3 fs-4 fw-bold text-dark mt-3" style="transition: transform 0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">
                🎲 搖籤筒 / 抽籤
            </button>
        </form>
    </div>
</div>
{% endblock %}
