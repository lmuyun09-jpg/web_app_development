{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h2 class="text-center mb-4">註冊新帳號</h2>
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">顯示名稱</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">電子信箱</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">設定密碼</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-danger fw-bold text-white">建立帳號</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <small>已經有帳號了？ <a href="{{ url_for('auth.login') }}">點此登入</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
